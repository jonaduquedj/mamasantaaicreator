<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAMA SANTA AI Creator by Jay D</title>

  <link rel="stylesheet" href="css/styles.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>

<body>

<header>
  <div class="brand">
    <img src="assets/images/logo-mama-santa.jpeg" alt="MAMA SANTA Logo" />
    <span>AI Generator by Jay D</span>
  </div>
</header>

<main>

  <!-- ✅ TABS (NECESARIOS PARA TU CSS) -->
  <nav class="tabs">
    <button class="tab active" data-tab="image">
      <span class="tab-icon">🖼</span>
      <span class="tab-text">Image</span>
    </button>

    <button class="tab" data-tab="video">
      <span class="tab-icon">🎥</span>
      <span class="tab-text">Video</span>
    </button>
  </nav>

  <!-- ✅ IMAGE TAB -->
  <section id="image" class="tab-content active">
    <div class="layout">

      <aside class="controls-panel">
        <h3>Image Configuration</h3>

        <label>Reference Image</label>
        <div class="upload-box">
          <input type="file" id="referenceImage" accept="image/png,image/jpeg" hidden />
          <label for="referenceImage" class="upload-label">
            <span class="upload-icon">⬆</span>
            <strong>Upload Reference Image</strong>
            <p>PNG or JPG · Max 10MB</p>
          </label>

          <!-- ✅ PREVIEW -->
          <div class="upload-preview">
            <img class="preview-image" alt="Preview" />
          </div>
        </div>

        <label>Image Prompt</label>
        <textarea
          id="imagePrompt"
          placeholder="Describe the image you want to generate..."
        ></textarea>

        <div class="suggested-prompts">
          <span class="suggested-title">Suggested Prompts</span>
          <div class="prompt-list">
            <button type="button" class="prompt-chip">Professional studio fashion shot, clean background</button>
            <button type="button" class="prompt-chip">Instagram lifestyle content, natural lighting</button>
            <button type="button" class="prompt-chip">Luxury fashion portrait, editorial style</button>
            <button type="button" class="prompt-chip">Cinematic lighting, premium brand aesthetic</button>
          </div>
        </div>

        <button id="generateBtn" class="primary-action">Generate Image</button>
      </aside>

      <div class="preview-panel">
        <div class="preview-placeholder">Generated image will appear here</div>
        <img id="outputImage" style="display:none; max-width:100%; border-radius:12px;" />
      </div>

    </div>
  </section>

  <!-- ✅ VIDEO TAB (PLACEHOLDER, NO ROMPE CSS) -->
  <section id="video" class="tab-content">
    <div class="preview-panel">
      <div class="preview-placeholder">
        Video generation coming soon ✨
      </div>
    </div>
  </section>

</main>

<footer>
  © 2026 Jay D IA®. Powered by Google Gemini
</footer>

<script src="js/app.js" type="module"></script>

<!-- ✅ TAB SWITCH LOGIC -->
<script>
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'))

      tab.classList.add('active')
      document.getElementById(tab.dataset.tab).classList.add('active')
    })
  })
</script>

</body>
</html>
